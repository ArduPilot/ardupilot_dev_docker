name: build and push ArduPilot container

concurrency:
  group: ci-${{github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '.github/workflows/ros_nightly.yml'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '.github/workflows/ros_nightly.yml'
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC

env:
  REGISTRY: docker.io
  BASE_IMAGE_NAME: ardupilot/ardupilot-dev-base

jobs:
  # Generate metadata and tags for all images
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      annotations: ${{ steps.meta.outputs.annotations }}
      json: ${{ steps.meta.outputs.json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=master
            type=edge,branch=main
            type=sha,format=short
            type=schedule,pattern=nightly
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Debug metadata outputs
        run: |
          echo "Version: ${{ steps.meta.outputs.version }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Labels: ${{ steps.meta.outputs.labels }}"
          labels: |
            org.opencontainers.image.title=ArduPilot Development Base Image
            org.opencontainers.image.description=Base development environment for ArduPilot
            org.opencontainers.image.vendor=ArduPilot.org

  build-base:
    runs-on: ubuntu-latest
    needs: metadata
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-metadata: ${{ steps.build.outputs.metadata }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile_dev-base
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ needs.metadata.outputs.tags }}
          labels: ${{ needs.metadata.outputs.labels }}
          annotations: ${{ needs.metadata.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # Build main development images that depend on base
  build-main-images:
    needs: [metadata, build-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: clang
            dockerfile: Dockerfile_dev-clang
            platforms: linux/amd64
          - config: chibios  
            dockerfile: Dockerfile_dev-chibios
            platforms: linux/amd64
          - config: armhf
            dockerfile: Dockerfile_dev-armhf
            platforms: linux/amd64
          - config: aarch64
            dockerfile: Dockerfile_dev-aarch64
            platforms: linux/amd64
          - config: coverage
            dockerfile: Dockerfile_dev-coverage
            platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate metadata for ${{ matrix.config }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ardupilot/ardupilot-dev-${{ matrix.config }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=master
            type=edge,branch=main
            type=sha,format=short
            type=schedule,pattern=nightly
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=ArduPilot Development ${{ matrix.config }} Image
            org.opencontainers.image.description=ArduPilot development environment for ${{ matrix.config }}
            org.opencontainers.image.vendor=ArduPilot.org

      - name: Build and push ${{ matrix.config }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            TAG=${{ needs.metadata.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # Build images that depend on main images
  build-dependent-images:
    needs: [metadata, build-main-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: armhf-musl
            dockerfile: Dockerfile_dev-armhf-musl
            platforms: linux/amd64
            base_image: armhf
          - config: periph
            dockerfile: Dockerfile_dev-periph
            platforms: linux/amd64
            base_image: coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate metadata for ${{ matrix.config }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ardupilot/ardupilot-dev-${{ matrix.config }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=master
            type=edge,branch=main
            type=sha,format=short
            type=schedule,pattern=nightly
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=ArduPilot Development ${{ matrix.config }} Image
            org.opencontainers.image.description=ArduPilot development environment for ${{ matrix.config }}
            org.opencontainers.image.vendor=ArduPilot.org

      - name: Build and push ${{ matrix.config }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            TAG=${{ needs.metadata.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # Summary job for status checks
  build-complete:
    needs: [build-base, build-main-images, build-dependent-images]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.build-base.result }}" == "success" && \
                "${{ needs.build-main-images.result }}" == "success" && \
                "${{ needs.build-dependent-images.result }}" == "success" ]]; then
            echo "✅ All builds completed successfully"
            exit 0
          else
            echo "❌ Some builds failed:"
            echo "Base image: ${{ needs.build-base.result }}"
            echo "Main images: ${{ needs.build-main-images.result }}"
            echo "Dependent images: ${{ needs.build-dependent-images.result }}"
            exit 1
          fi
